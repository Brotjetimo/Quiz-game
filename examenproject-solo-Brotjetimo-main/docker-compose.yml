x-common-variables: &common-variables
  MYSQL_USER: brot
  MYSQL_PASSWORD: brot
  MYSQL_DATABASE: quiz
  REACT_APP_SERVER_PORT: 8000

services:
  mysql:
    image: mysql:5.7
    environment:
      <<: *common-variables
      MYSQL_HOST: localhost
      MYSQL_ROOT_PASSWORD: root
    ports:
      - 3306:3306
    restart: unless-stopped
    volumes:
      - ./quiz_game_backend/database-migrations:/docker-entrypoint-initdb.d
  frontend:
    build: ./quiz_game_frontend
    ports:
      - 80:80
  backend:
    build: ./quiz_game_backend
    ports:
      - 3000:3000